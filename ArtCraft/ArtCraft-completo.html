/* engine.js — Core painting engine: CanvasEngine, BrushEngine, ToolManager, UndoManager */
'use strict';

// ─── UTILS ──────────────────────────────────────────────────────────────────
function hsvToRgb(h,s,v){s/=100;v/=100;const i=Math.floor(h/60)%6,f=(h/60)-Math.floor(h/60),p=v*(1-s),q=v*(1-f*s),t=v*(1-s*(1-f));const m=[[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i];return m.map(x=>Math.round(x*255));}
function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h=0,s=max===0?0:d/max,v=max;if(d!==0){h=max===r?(g-b)/d+(g<b?6:0):max===g?(b-r)/d+2:(r-g)/d+4;h*=60;}return[h,s*100,v*100];}
function hexToRgb(hex){const n=parseInt(hex,16);return[(n>>16)&255,(n>>8)&255,n&255];}
function rgbToHex(r,g,b){return((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// ─── UNDO MANAGER ───────────────────────────────────────────────────────────
class UndoManager {
  constructor(){this.stacks=[];this.pos=-1;this.maxSteps=30;}
  push(layerData){// layerData: array of {id, imageData}
    this.stacks.splice(this.pos+1);
    if(this.stacks.length>=this.maxSteps)this.stacks.shift();
    this.stacks.push(layerData);
    this.pos=this.stacks.length-1;
  }
  undo(){if(this.pos>0){this.pos--;return this.stacks[this.pos];}return null;}
  redo(){if(this.pos<this.stacks.length-1){this.pos++;return this.stacks[this.pos];}return null;}
  canUndo(){return this.pos>0;}
  canRedo(){return this.pos<this.stacks.length-1;}
}

// ─── CANVAS ENGINE ───────────────────────────────────────────────────────────
class CanvasEngine {
  constructor(w,h){
    this.displayCanvas=document.getElementById('display-canvas');
    this.checkerboard=document.getElementById('checkerboard');
    this.cursorOverlay=document.getElementById('cursor-overlay');
    this.wrapper=document.getElementById('canvas-wrapper');
    this.viewport=document.getElementById('canvas-viewport');
    this.width=w||800;this.height=h||600;
    this.zoom=1;this.panX=0;this.panY=0;
    this.layers=[];this.activeLayerIdx=0;
    this.undo=new UndoManager();
    this._rafId=null;this._dirty=true;
    this._initDisplay();
    this._initCheckerboard();
    this._fitToView();
    this._startRenderLoop();
  }
  _initDisplay(){
    this.displayCanvas.width=this.width;
    this.displayCanvas.height=this.height;
    this.cursorOverlay.width=this.width;
    this.cursorOverlay.height=this.height;
    this.displayCanvas.style.width=this.width+'px';
    this.displayCanvas.style.height=this.height+'px';
    this.cursorOverlay.style.width=this.width+'px';
    this.cursorOverlay.style.height=this.height+'px';
  }
  _initCheckerboard(){
    const c=this.checkerboard;
    c.width=this.width;c.height=this.height;
    c.style.width=this.width+'px';c.style.height=this.height+'px';
    const ctx=c.getContext('2d'),sz=12;
    for(let y=0;y<this.height;y+=sz){
      for(let x=0;x<this.width;x+=sz){
        ctx.fillStyle=((x/sz+y/sz)%2===0)?'#cccccc':'#ffffff';
        ctx.fillRect(x,y,sz,sz);
      }
    }
  }
  resize(w,h){
    this.width=w;this.height=h;
    this.layers.forEach(l=>{
      const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h;
      tmp.getContext('2d').drawImage(l.canvas,0,0);
      l.canvas=tmp;
    });
    this._initDisplay();
    this._initCheckerboard();
    this._fitToView();
    this._dirty=true;
  }
  _fitToView(){
    const vp=this.viewport;
    const vw=vp.clientWidth||800,vh=vp.clientHeight||600;
    const sx=(vw-20)/this.width,sy=(vh-20)/this.height;
    this.zoom=Math.min(sx,sy,1);
    this.panX=Math.round((vw-this.width*this.zoom)/2);
    this.panY=Math.round((vh-this.height*this.zoom)/2);
    this._applyTransform();
  }
  _applyTransform(){
    this.wrapper.style.transform=`translate(${this.panX}px,${this.panY}px) scale(${this.zoom})`;
    document.getElementById('zoom-display').textContent=Math.round(this.zoom*100)+'%';
  }
  setZoom(z,cx,cy){
    const oz=this.zoom;
    this.zoom=clamp(z,.05,32);
    this.panX=cx-(cx-this.panX)*this.zoom/oz;
    this.panY=cy-(cy-this.panY)*this.zoom/oz;
    this._applyTransform();
  }
  screenToCanvas(sx,sy){
    return{x:(sx-this.panX)/this.zoom,y:(sy-this.panY)/this.zoom};
  }
  _startRenderLoop(){
    const loop=()=>{if(this._dirty)this._composite();this._rafId=requestAnimationFrame(loop);};
    loop();
  }
  _composite(){
    this._dirty=false;
    const ctx=this.displayCanvas.getContext('2d');
    ctx.clearRect(0,0,this.width,this.height);
    for(let i=this.layers.length-1;i>=0;i--){
      const l=this.layers[i];
      if(!l.visible)continue;
      ctx.globalAlpha=l.opacity/100;
      ctx.globalCompositeOperation=l.blendMode||'source-over';
      ctx.drawImage(l.canvas,0,0);
    }
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    // update thumbs
    this.layers.forEach(l=>l._thumbDirty&&this._updateThumb(l));
  }
  _updateThumb(l){
    if(!l._thumbEl)return;
    l._thumbDirty=false;
    const tc=document.createElement('canvas');tc.width=36;tc.height=28;
    const tx=tc.getContext('2d');tx.drawImage(l.canvas,0,0,36,28);
    l._thumbEl.src=tc.toDataURL();
  }
  markDirty(){this._dirty=true;}

  // ── LAYER OPS ──
  addLayer(name,idx){
    const c=document.createElement('canvas');c.width=this.width;c.height=this.height;
    const layer={canvas:c,name:name||'Camada '+(this.layers.length+1),visible:true,locked:false,opacity:100,blendMode:'source-over',_thumbDirty:true,_thumbEl:null};
    if(idx===undefined)this.layers.unshift(layer);
    else this.layers.splice(idx,0,layer);
    this.activeLayerIdx=idx===undefined?0:idx;
    this.markDirty();
    return layer;
  }
  addTextLayer(text,font,size,x,y,colorStr,idx){
    const c=document.createElement('canvas');c.width=this.width;c.height=this.height;
    const layer={
      canvas:c,name:text.substring(0,12)||'Texto',visible:true,locked:false,opacity:100,blendMode:'source-over',
      _thumbDirty:true,_thumbEl:null,
      isText:true,textData:{text,font,size,x,y,color:colorStr}
    };
    if(idx===undefined)this.layers.unshift(layer);
    else this.layers.splice(idx,0,layer);
    this.activeLayerIdx=idx===undefined?0:idx;
    this._renderTextLayer(layer);
    this.markDirty();
    return layer;
  }
  _renderTextLayer(layer){
    const ctx=layer.canvas.getContext('2d');
    ctx.clearRect(0,0,this.width,this.height);
    const d=layer.textData;
    ctx.font=`${d.size}px ${d.font}`;
    ctx.fillStyle=d.color;
    ctx.globalCompositeOperation='source-over';
    ctx.fillText(d.text,d.x,d.y);
    layer._thumbDirty=true;
  }
  updateActiveTextLayer(newData){
    const l=this.activeLayer;
    if(!l||!l.isText)return false;
    Object.assign(l.textData,newData);
    l.name=l.textData.text.substring(0,12)||'Texto';
    this._renderTextLayer(l);
    this.markDirty();
    return true;
  }
  deleteLayer(idx){
    if(this.layers.length<=1)return;
    this.layers.splice(idx,1);
    this.activeLayerIdx=clamp(this.activeLayerIdx,0,this.layers.length-1);
    this.markDirty();
  }
  duplicateLayer(idx){
    const src=this.layers[idx];
    const c=document.createElement('canvas');c.width=this.width;c.height=this.height;
    c.getContext('2d').drawImage(src.canvas,0,0);
    const dup={...src,canvas:c,name:src.name+' Cópia',_thumbEl:null,_thumbDirty:true};
    this.layers.splice(idx,0,dup);
    this.activeLayerIdx=idx;
    this.markDirty();
  }
  mergeDown(idx){
    if(idx>=this.layers.length-1)return;
    const top=this.layers[idx],bot=this.layers[idx+1];
    const bctx=bot.canvas.getContext('2d');
    bctx.globalAlpha=top.opacity/100;bctx.globalCompositeOperation=top.blendMode;
    bctx.drawImage(top.canvas,0,0);
    bctx.globalAlpha=1;bctx.globalCompositeOperation='source-over';
    this.layers.splice(idx,1);
    this.activeLayerIdx=idx<this.layers.length?idx:this.layers.length-1;
    bot._thumbDirty=true;this.markDirty();
  }

  get activeLayer(){return this.layers[this.activeLayerIdx];}

  // Snapshot for undo
  snapshot(){
    return this.layers.map(l=>{
      const id=l.canvas.getContext('2d').getImageData(0,0,l.canvas.width,l.canvas.height);
      return{
        id,name:l.name,visible:l.visible,locked:l.locked,opacity:l.opacity,blendMode:l.blendMode,
        isText:l.isText,textData:l.textData?{...l.textData}:null
      };
    });
  }
  restoreSnapshot(snap){
    // Restore same number of layers (matching by index)
    while(this.layers.length<snap.length){const c=document.createElement('canvas');c.width=this.width;c.height=this.height;this.layers.unshift({canvas:c,name:'L',visible:true,locked:false,opacity:100,blendMode:'source-over',_thumbDirty:true,_thumbEl:null});}
    while(this.layers.length>snap.length)this.layers.pop();
    snap.forEach((s,i)=>{
      const l=this.layers[i];
      l.canvas.width=s.id.width;l.canvas.height=s.id.height;
      l.canvas.getContext('2d').putImageData(s.id,0,0);
      l.name=s.name;l.visible=s.visible;l.locked=s.locked;l.opacity=s.opacity;l.blendMode=s.blendMode;
      l.isText=s.isText;l.textData=s.textData?{...s.textData}:null;
      l._thumbDirty=true;
    });
    this.markDirty();
  }
}

// ─── BRUSH ENGINE ────────────────────────────────────────────────────────────
class BrushEngine {
  constructor(engine){
    this.eng=engine;
    this.brushes=this._defaultBrushes();
    this.activeBrushIdx=0;
    this._lastX=0;this._lastY=0;this._dist=0;
    this._painting=false;
    // settings overrides from UI
    this.uiSize=null;this.uiOpacity=null;this.uiFlow=null;this.uiHardness=null;
    this.uiSpacing=null;this.uiScatter=null;this.uiAngle=null;
    // color
    this.color={h:0,s:0,v:0,a:100};
    // smear buffer
    this._smearBuf=null;
  }
  get brush(){return this.brushes[this.activeBrushIdx];}
  get size(){return this.uiSize??this.brush.size;}
  get opacity(){return this.uiOpacity??this.brush.opacity;}
  get flow(){return this.uiFlow??this.brush.flow;}
  get hardness(){return this.uiHardness??this.brush.hardness;}
  get spacing(){return this.uiSpacing??this.brush.spacing;}
  get scatter(){return this.uiScatter??this.brush.scatter;}
  get angle(){return this.uiAngle??this.brush.angle;}

  _defaultBrushes(){return[
    {name:'Hard Pen',   size:8,  opacity:100,flow:100,hardness:100,spacing:5, scatter:0, angle:0, texture:null, blendMode:'source-over', eraser:false,smear:false,desc:'Linha digital limpa'},
    {name:'Soft Brush', size:30, opacity:80, flow:60, hardness:0,  spacing:8, scatter:0, angle:0, texture:null, blendMode:'source-over', eraser:false,smear:false,desc:'Pincel suave'},
    {name:'Pencil',     size:6,  opacity:90, flow:80, hardness:70, spacing:4, scatter:5, angle:0, texture:'grain',blendMode:'source-over',eraser:false,smear:false,desc:'Lápis texturizado'},
    {name:'Marker',     size:20, opacity:60, flow:100,hardness:100,spacing:5, scatter:0, angle:0, texture:null, blendMode:'multiply', eraser:false,smear:false,desc:'Marcador plano'},
    {name:'Watercolor', size:40, opacity:40, flow:30, hardness:0,  spacing:10,scatter:8, angle:0, texture:null, blendMode:'source-over', eraser:false,smear:false,desc:'Aquarela molhada'},
    {name:'G-Pen',      size:5,  opacity:100,flow:100,hardness:90, spacing:3, scatter:0, angle:0, texture:null, blendMode:'source-over', eraser:false,smear:false,desc:'Caneta G (manga)'},
    {name:'Airbrush',   size:60, opacity:50, flow:40, hardness:0,  spacing:6, scatter:0, angle:0, texture:null, blendMode:'source-over', eraser:false,smear:false,desc:'Aerógrafo'},
    {name:'Rake',       size:15, opacity:100,flow:100,hardness:80, spacing:4, scatter:0, angle:0, texture:'rake',blendMode:'source-over', eraser:false,smear:false,desc:'Multi-cerdas'},
    {name:'Smear',      size:30, opacity:70, flow:50, hardness:30, spacing:5, scatter:0, angle:0, texture:null, blendMode:'source-over', eraser:false,smear:true, desc:'Borrar/misturar'},
    {name:'Eraser',     size:20, opacity:100,flow:100,hardness:50, spacing:5, scatter:0, angle:0, texture:null, blendMode:'destination-out',eraser:true,smear:false,desc:'Borracha'},
  ];}

  getRgba(){
    const [r,g,b]=hsvToRgb(this.color.h,this.color.s,this.color.v);
    return{r,g,b,a:this.color.a/100};
  }
  getColorStr(){const {r,g,b,a}=this.getRgba();return`rgba(${r},${g},${b},${a})`;}

  beginStroke(x,y,pressure){
    if(this.eng.activeLayer.locked||this.eng.activeLayer.isText)return;
    this._painting=true;
    this._lastX=x;this._lastY=y;this._dist=0;
    const ctx=this.eng.activeLayer.canvas.getContext('2d');
    if(this.brush.smear){this._smearBuf=ctx.getImageData(0,0,this.eng.width,this.eng.height);}
    this._stamp(ctx,x,y,pressure);
    this.eng.activeLayer._thumbDirty=true;
    this.eng.markDirty();
  }
  moveStroke(x,y,pressure){
    if(!this._painting)return;
    const dx=x-this._lastX,dy=y-this._lastY,d=Math.sqrt(dx*dx+dy*dy);
    if(d===0)return;
    const sp=Math.max(1,this.size*(this.spacing/100));
    const ctx=this.eng.activeLayer.canvas.getContext('2d');
    // Smooth stamp-along-line approach
    this._stampLine(ctx,this._lastX,this._lastY,x,y,pressure);
    this._lastX=x;this._lastY=y;
    this.eng.activeLayer._thumbDirty=true;
    this.eng.markDirty();
  }
  endStroke(){this._painting=false;this._smearBuf=null;}

  _stampLine(ctx,x0,y0,x1,y1,pressure){
    const dx=x1-x0,dy=y1-y0,d=Math.sqrt(dx*dx+dy*dy);
    if(d===0){this._stamp(ctx,x0,y0,pressure);return;}
    const sp=Math.max(1,this.size*(this.spacing/100));
    let dist=0;
    while(dist<d){
      const t=dist/d;
      const sx=x0+dx*t+((Math.random()-.5)*this.scatter);
      const sy=y0+dy*t+((Math.random()-.5)*this.scatter);
      this._stamp(ctx,sx,sy,pressure);
      dist+=sp;
    }
  }
  _stamp(ctx,x,y,pressure){
    const pr=Math.max(0.01,pressure||0.5);
    const sz=Math.max(1,this.size*pr);
    const sc=this.scatter,sc2=sc/2;
    const px=x+(Math.random()-.5)*sc2;
    const py=y+(Math.random()-.5)*sc2;
    const op=(this.opacity/100)*(this.flow/100)*pr;
    const {r,g,b}=this.getRgba();
    const bm=this.brush.blendMode||'source-over';
    ctx.save();
    ctx.globalAlpha=clamp(op,0,1);
    ctx.globalCompositeOperation=bm;

    if(this.brush.texture==='grain'){this._stampGrain(ctx,px,py,sz,r,g,b);}
    else if(this.brush.texture==='rake'){this._stampRake(ctx,px,py,sz,r,g,b,op);}
    else if(this.brush.texture&&this.brush._texImg){this._stampTexture(ctx,px,py,sz,r,g,b);}
    else if(this.brush.smear){this._stampSmear(ctx,px,py,sz);}
    else{this._stampCircle(ctx,px,py,sz,r,g,b);}
    ctx.restore();
  }
  _stampCircle(ctx,x,y,sz,r,g,b){
    const h=this.hardness/100,rad=sz/2;
    const grd=ctx.createRadialGradient(x,y,rad*h,x,y,rad);
    grd.addColorStop(0,`rgb(${r},${g},${b})`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=h>=1?`rgb(${r},${g},${b})`:grd;
    ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fill();
  }
  _stampGrain(ctx,x,y,sz,r,g,b){
    const rad=sz/2;
    for(let i=0;i<6;i++){
      const rx=(Math.random()-.5)*rad,ry=(Math.random()-.5)*rad;
      ctx.fillStyle=`rgba(${r},${g},${b},${Math.random()*0.4+0.3})`;
      ctx.fillRect(x+rx,y+ry,Math.random()*2+1,Math.random()*2+1);
    }
    this._stampCircle(ctx,x,y,sz*.6,r,g,b);
  }
  _stampRake(ctx,x,y,sz,r,g,b){
    const tines=4,sp=sz/tines;
    for(let i=0;i<tines;i++){
      const ox=(i-(tines-1)/2)*sp;
      ctx.fillStyle=`rgb(${r},${g},${b})`;
      ctx.beginPath();ctx.arc(x+ox,y,sz/6,0,Math.PI*2);ctx.fill();
    }
  }
  _stampTexture(ctx,x,y,sz){
    ctx.drawImage(this.brush._texImg,x-sz/2,y-sz/2,sz,sz);
  }
  _stampSmear(ctx,x,y,sz){
    if(!this._smearBuf)return;
    const rad=sz/2,ix=Math.round(x-rad),iy=Math.round(y-rad),iw=Math.round(sz),ih=Math.round(sz);
    if(ix<0||iy<0||ix+iw>this.eng.width||iy+ih>this.eng.height)return;
    const picked=this.eng.activeLayer.canvas.getContext('2d').getImageData(ix,iy,iw,ih);
    // smear = draw picked data shifted slightly
    const tmpC=document.createElement('canvas');tmpC.width=iw;tmpC.height=ih;
    tmpC.getContext('2d').putImageData(picked,0,0);
    ctx.globalAlpha=0.3;ctx.globalCompositeOperation='source-over';
    ctx.drawImage(tmpC,ix+2,iy+2,iw,ih);
  }

  previewBrush(){
    const c=document.getElementById('brush-preview');
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,100,60);
    const {r,g,b}=this.getRgba();
    const savedColor=this.color;
    this.color={h:0,s:0,v:0,a:100};
    ctx.fillStyle=`rgba(30,30,40,1)`;ctx.fillRect(0,0,100,60);
    // draw a stroke preview on temp canvas
    const tmp=document.createElement('canvas');tmp.width=100;tmp.height=60;
    const tctx=tmp.getContext('2d');
    const oldP=this._painting;this._painting=true;
    for(let x=10;x<90;x+=1){
      const t=(x-10)/80;const y=30+Math.sin(t*Math.PI*1.5)*10;
      this._stamp(tctx,x,y,0.7);
    }
    this._painting=oldP;
    ctx.globalCompositeOperation='source-over';
    ctx.drawImage(tmp,0,0);
    this.color=savedColor;
  }

  // .ibp importer
  async importIbp(file){
    try{
      const zip=await JSZip.loadAsync(file);
      const jsonFile=zip.file('brush.json');
      if(!jsonFile)throw new Error('brush.json not found in .ibp');
      const json=JSON.parse(await jsonFile.async('string'));
      const b={
        name:json.name||file.name.replace('.ibp',''),
        size:json.size||10,opacity:json.opacity??100,flow:json.flow??100,
        hardness:json.hardness??100,spacing:json.spacing??10,
        scatter:json.scatter??0,angle:json.angle??0,
        blendMode:json.blendMode||'source-over',eraser:!!json.eraser,smear:!!json.smear,
        texture:json.textureId||null,_texImg:null,desc:'Importado',
      };
      const texFile=zip.file('texture.png');
      if(texFile){
        const blob=await texFile.async('blob');
        const url=URL.createObjectURL(blob);
        const img=new Image();await new Promise(res=>{img.onload=res;img.src=url;});
        b._texImg=img;b.texture='custom';
      }
      this.brushes.push(b);
      return b;
    }catch(e){throw e;}
  }
}

// ─── FLOOD FILL ──────────────────────────────────────────────────────────────
function floodFill(canvas,startX,startY,fillR,fillG,fillB,fillA,tolerance=20){
  startX=Math.round(startX);startY=Math.round(startY);
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  const imgData=ctx.getImageData(0,0,w,h);
  const data=imgData.data;
  const idx=(x,y)=>(y*w+x)*4;
  const si=idx(startX,startY);
  const sr=data[si],sg=data[si+1],sb=data[si+2],sa=data[si+3];
  const match=(i)=>{
    return Math.abs(data[i]-sr)<=tolerance&&Math.abs(data[i+1]-sg)<=tolerance&&Math.abs(data[i+2]-sb)<=tolerance&&Math.abs(data[i+3]-sa)<=tolerance;
  };
  const fa=Math.round(fillA*255);
  if(Math.abs(sr-fillR)<2&&Math.abs(sg-fillG)<2&&Math.abs(sb-fillB)<2&&Math.abs(sa-fa)<2)return;
  const visited=new Uint8Array(w*h);
  const queue=[startX+startY*w];
  visited[startX+startY*w]=1;
  while(queue.length){
    const pos=queue.shift();
    const x=pos%w,y=Math.floor(pos/w);
    const pi=pos*4;
    data[pi]=fillR;data[pi+1]=fillG;data[pi+2]=fillB;data[pi+3]=fa;
    const neighbors=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    for(const[nx,ny]of neighbors){
      if(nx<0||nx>=w||ny<0||ny>=h)continue;
      const np=nx+ny*w;
      if(visited[np])continue;
      visited[np]=1;
      if(match(np*4))queue.push(np);
    }
  }
  ctx.putImageData(imgData,0,0);
}

// ─── TOOL MANAGER ────────────────────────────────────────────────────────────
class ToolManager {
  constructor(eng,brushEng){
    this.eng=eng;this.be=brushEng;
    this.activeTool='brush';
    this._selecting=false;this._selStart=null;this._selRect=null;
    this._selCanvas=null;
    this._moving=false;this._moveStart=null;this._moveLayerData=null;
    this._panning=false;this._panStart=null;
    this._textPending=null;
    this._initEvents();
  }
  setTool(t){this.activeTool=t;}

  _initEvents(){
    const vp=this.eng.viewport;
    vp.addEventListener('pointerdown',e=>this._onDown(e),{passive:false});
    vp.addEventListener('pointermove',e=>this._onMove(e),{passive:false});
    vp.addEventListener('pointerup',e=>this._onUp(e));
    vp.addEventListener('pointercancel',e=>this._onUp(e));
    vp.addEventListener('wheel',e=>this._onWheel(e),{passive:false});
    window.addEventListener('keydown',e=>this._onKey(e));
  }

  _pos(e){
    const rect=this.eng.viewport.getBoundingClientRect();
    const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
    return this.eng.screenToCanvas(sx,sy);
  }
  _screenPos(e){
    const rect=this.eng.viewport.getBoundingClientRect();
    return{x:e.clientX-rect.left,y:e.clientY-rect.top};
  }

  _onDown(e){
    e.preventDefault();
    // Middle button or Space pan
    if(e.button===1||(e.button===0&&e.spaceKey)){this._startPan(e);return;}
    const p=this._pos(e);
    const pr=e.pressure||0.5;
    // save undo before stroke
    this._saveUndo();
    switch(this.activeTool){
      case'brush':case'eraser':this.be.beginStroke(p.x,p.y,pr);break;
      case'fill':{
        if(this.eng.activeLayer.locked||this.eng.activeLayer.isText)return;
        const {r,g,b,a}=this.be.getRgba();
        floodFill(this.eng.activeLayer.canvas,p.x,p.y,r,g,b,a);
        this.eng.activeLayer._thumbDirty=true;this.eng.markDirty();
        break;}
      case'eyedropper':{
        const imgD=this.eng.displayCanvas.getContext('2d').getImageData(Math.round(p.x),Math.round(p.y),1,1).data;
        const [hh,ss,vv]=rgbToHsv(imgD[0],imgD[1],imgD[2]);
        this.be.color={h:hh,s:ss,v:vv,a:(imgD[3]/255)*100};
        window._ui&&window._ui.syncColorFromEngine();
        break;}
      case'select-rect':this._selecting=true;this._selStart=p;this._selRect=null;break;
      case'lasso':this._selectingLasso=true;this._lassoPoints=[p];break;
      case'move':this._startMove(e,p);break;
      case'text':this._placeText(p);break;
      case'select':{
        let found=-1;
        const ctx=this.eng.displayCanvas.getContext('2d');
        for(let i=0;i<this.eng.layers.length;i++){
          const l=this.eng.layers[i];
          if(l.isText&&l.visible&&!l.locked){
            const d=l.textData;
            ctx.font=`${d.size}px ${d.font}`;
            const w=ctx.measureText(d.text).width;
            const h=d.size;
            if(p.x>=d.x&&p.x<=d.x+w&&p.y>=d.y-h&&p.y<=d.y+h*0.2){
              found=i;break;
            }
          }
        }
        if(found!==-1){
          this.eng.activeLayerIdx=found;
          window._ui&&window._ui.refreshLayersPanel();
          this._placeText(p);
        }else{
          window._ui&&window._ui.toast('Nenhum texto selecionado nesta área');
        }
        break;}
    }
  }
  _onMove(e){
    if(this._panning){this._doPan(e);return;}
    const p=this._pos(e);const pr=e.pressure||0.5;
    // cursor overlay
    this._drawCursor(p,this.be.size);
    switch(this.activeTool){
      case'brush':case'eraser':case'blur':this.be.moveStroke(p.x,p.y,pr);break;
      case'select-rect':if(this._selecting)this._drawSelRect(this._selStart,p);break;
      case'lasso':if(this._selectingLasso)this._lassoPoints.push(p);break;
      case'move':if(this._moving)this._doMove(p);break;
    }
  }
  _onUp(e){
    if(this._panning){this._panning=false;return;}
    const p=this._pos(e);
    switch(this.activeTool){
      case'brush':case'eraser':case'blur':this.be.endStroke();break;
      case'select-rect':this._selecting=false;break;
      case'lasso':this._selectingLasso=false;break;
      case'move':this._moving=false;break;
    }
  }
  _onWheel(e){
    e.preventDefault();
    const sp=this._screenPos(e);
    const factor=e.deltaY<0?1.1:0.9;
    this.eng.setZoom(this.eng.zoom*factor,sp.x,sp.y);
  }
  _onKey(e){
    if(e.code==='Space')this._spaceDown=true;
    if(e.ctrlKey&&e.key==='z'){e.preventDefault();window._app&&window._app.undo();}
    if(e.ctrlKey&&(e.key==='y'||e.key==='Y')){e.preventDefault();window._app&&window._app.redo();}
    // tool shortcuts
    const map={b:'brush',e:'eraser',g:'fill',i:'eyedropper',m:'select-rect',l:'lasso',v:'move',t:'text'};
    if(!e.ctrlKey&&!e.altKey&&map[e.key])window._ui&&window._ui.setTool(map[e.key]);
  }
  _saveUndo(){
    if(this.activeTool==='eyedropper')return;
    this.eng.undo.push(this.eng.snapshot());
  }
  _startPan(e){this._panning=true;this._panStart={x:e.clientX-this.eng.panX,y:e.clientY-this.eng.panY};}
  _doPan(e){
    if(!this._panStart)return;
    this.eng.panX=e.clientX-this._panStart.x;
    this.eng.panY=e.clientY-this._panStart.y;
    this.eng._applyTransform();
  }
  _drawSelRect(a,b){
    const oCtx=this.eng.cursorOverlay.getContext('2d');
    oCtx.clearRect(0,0,this.eng.width,this.eng.height);
    oCtx.setLineDash([5,3]);oCtx.strokeStyle='#5b8ff9';oCtx.lineWidth=1;
    oCtx.strokeRect(Math.min(a.x,b.x),Math.min(a.y,b.y),Math.abs(b.x-a.x),Math.abs(b.y-a.y));
    this._selRect={x:Math.min(a.x,b.x),y:Math.min(a.y,b.y),w:Math.abs(b.x-a.x),h:Math.abs(b.y-a.y)};
  }
  _startMove(e,p){
    if(this.eng.activeLayer.locked)return;
    this._moving=true;this._moveStart=p;
    const ctx=this.eng.activeLayer.canvas.getContext('2d');
    this._moveLayerData=ctx.getImageData(0,0,this.eng.width,this.eng.height);
    this._moveLayerPos={x:0,y:0};
  }
  _doMove(p){
    if(!this._moveStart||!this._moveLayerData)return;
    const dx=Math.round(p.x-this._moveStart.x),dy=Math.round(p.y-this._moveStart.y);
    const l=this.eng.activeLayer;
    const ctx=l.canvas.getContext('2d');
    ctx.clearRect(0,0,this.eng.width,this.eng.height);
    ctx.putImageData(this._moveLayerData,dx,dy);
    l._thumbDirty=true;this.eng.markDirty();
  }
  _placeText(p){
    const modal=document.getElementById('modal-text');
    const overlay=document.getElementById('modal-overlay');
    const input=document.getElementById('text-input');
    
    // If active layer is text, edit it instead of creating new
    if(this.eng.activeLayer&&this.eng.activeLayer.isText){
      this._textEditingLayer=this.eng.activeLayer;
      this._textPendingPos=null;
      input.value=this.eng.activeLayer.textData.text;
      document.getElementById('text-font').value=this.eng.activeLayer.textData.font;
      document.getElementById('text-size').value=this.eng.activeLayer.textData.size;
    }else{
      this._textEditingLayer=null;
      this._textPendingPos=p;
      input.value='';
    }
    
    overlay.classList.remove('hidden');modal.classList.remove('hidden');
    setTimeout(()=>input.focus(),50);
  }
  commitText(text,font,size){
    if(!text)return;
    const colorStr=this.be.getColorStr();
    if(this._textEditingLayer){
      this.eng.updateActiveTextLayer({text,font,size,color:colorStr});
    }else if(this._textPendingPos){
      // Insert new layer specifically above active layer
      this.eng.addTextLayer(text,font,size,this._textPendingPos.x,this._textPendingPos.y,colorStr,this.eng.activeLayerIdx);
    }
    this._textPendingPos=null;
    this._textEditingLayer=null;
    window._ui&&window._ui.refreshLayersPanel();
  }
  _drawCursor(p,sz){
    const ctx=this.eng.cursorOverlay.getContext('2d');
    ctx.clearRect(0,0,this.eng.width,this.eng.height);
    if(this.activeTool==='brush'||this.activeTool==='eraser'||this.activeTool==='blur'){
      const r=sz/2;
      ctx.beginPath();ctx.arc(p.x,p.y,Math.max(1,r),0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(p.x,p.y,Math.max(1,r),0,Math.PI*2);
      ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=0.5;ctx.stroke();
    }
  }
}

// ─── BLUR TOOL ───────────────────────────────────────────────────────────────
BrushEngine.prototype._blurStamp=function(ctx,x,y,sz){
  const r=sz/2,ix=Math.round(x-r),iy=Math.round(y-r),iw=Math.round(sz),ih=Math.round(sz);
  if(ix<0||iy<0||ix+iw>this.eng.width||iy+ih>this.eng.height)return;
  const tmpC=document.createElement('canvas');tmpC.width=iw;tmpC.height=ih;
  const tctx=tmpC.getContext('2d');
  tctx.filter=`blur(${sz*0.3}px)`;
  tctx.drawImage(ctx.canvas,ix,iy,iw,ih,0,0,iw,ih);
  ctx.save();ctx.globalAlpha=0.4;ctx.globalCompositeOperation='source-over';
  ctx.drawImage(tmpC,ix,iy,iw,ih);ctx.restore();
};

// Export globals
window.CanvasEngine=CanvasEngine;
window.BrushEngine=BrushEngine;
window.ToolManager=ToolManager;
window.hsvToRgb=hsvToRgb;
window.rgbToHsv=rgbToHsv;
window.hexToRgb=hexToRgb;
window.rgbToHex=rgbToHex;
window.clamp=clamp;

/* ui.js — UI Controller with Entry Screen + Full Painting Interface */
'use strict';

class UIController {
  constructor() {
    this.eng = null;
    this.be = null;
    this.tm = null;
    this._recentColors = [];
    this._bgColor = { h: 0, s: 0, v: 100, a: 100 };
    this._toastEl = document.getElementById('toast');
    this._toastTimer = null;
    this._menuOpen = false;

    this._initEntryScreen();
  }

  // ═══════════════════════════════════════════════════════════ SCREENS & MODALS
  _initEntryScreen() {
    document.getElementById('btn-home-gallery').addEventListener('click', () => {
      document.getElementById('new-canvas-modal').classList.remove('hidden');
    });

    const btnLocalGallery = document.getElementById('btn-local-gallery');
    if (btnLocalGallery) {
      btnLocalGallery.addEventListener('click', () => this._openLocalGallery());
    }
    const btnCloseGallery = document.getElementById('btn-close-gallery');
    if (btnCloseGallery) {
      btnCloseGallery.addEventListener('click', () => {
        document.getElementById('local-gallery-modal').classList.add('hidden');
      });
    }

    const presets = document.querySelectorAll('.preset-btn');
    const wInput = document.getElementById('entry-w');
    const hInput = document.getElementById('entry-h');

    // Preset selection
    presets.forEach(btn => {
      btn.addEventListener('click', () => {
        presets.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        wInput.value = btn.dataset.w;
        hInput.value = btn.dataset.h;
      });
    });

    // Custom input clears preset selection
    wInput.addEventListener('input', () => presets.forEach(b => b.classList.remove('active')));
    hInput.addEventListener('input', () => presets.forEach(b => b.classList.remove('active')));

    // Create button
    document.getElementById('btn-entry-create').addEventListener('click', () => {
      const w = parseInt(wInput.value);
      const h = parseInt(hInput.value);
      if (!w || !h || w < 1 || h < 1 || w > 8000 || h > 8000) {
        this._shakeInput(wInput);
        return;
      }
      this._startApp(w, h, null);
    });

    // Open image
    document.getElementById('btn-entry-open').addEventListener('click', () => {
      document.getElementById('open-image-input').click();
    });

    document.getElementById('open-image-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        const w = img.naturalWidth || 800;
        const h = img.naturalHeight || 600;
        this._startApp(w, h, img);
        URL.revokeObjectURL(url);
      };
      img.src = url;
      e.target.value = '';
    });
  }

  async _openLocalGallery() {
    const modal = document.getElementById('local-gallery-modal');
    modal.classList.remove('hidden');
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = '<div class="gallery-empty">Carregando...</div>';
    
    try {
      const arts = await window.artStorage.listArtworks();
      if (arts.length === 0) {
        grid.innerHTML = '<div class="gallery-empty">Nenhuma arte salva na galeria local.<br><br>Comece a pintar e clique em Voltar para salvar.</div>';
        return;
      }
      grid.innerHTML = '';
      for (const art of arts) {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        const img = document.createElement('img');
        img.className = 'gallery-thumb';
        img.src = art.thumbURL || 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';
        
        const info = document.createElement('div');
        info.className = 'gallery-info';
        const title = document.createElement('div');
        title.className = 'gallery-title';
        title.textContent = art.name || 'Nova Arte';
        const date = document.createElement('div');
        date.className = 'gallery-date';
        date.textContent = new Date(art.updatedAt).toLocaleString();
        
        const btnDel = document.createElement('button');
        btnDel.className = 'btn-delete-art';
        btnDel.title = 'Excluir';
        btnDel.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>';
        btnDel.onclick = async (e) => {
          e.stopPropagation();
          if (confirm('Tem certeza que deseja excluir esta arte permanente?')) {
            await window.artStorage.deleteArtwork(art.id);
            this._openLocalGallery();
          }
        };

        info.appendChild(title);
        info.appendChild(date);
        item.appendChild(img);
        item.appendChild(info);
        item.appendChild(btnDel);

        item.onclick = async () => {
          modal.classList.add('hidden');
          const fullArt = await window.artStorage.loadArtwork(art.id);
          this._startApp(fullArt.width, fullArt.height, null, fullArt);
        };
        grid.appendChild(item);
      }
    } catch (e) {
      grid.innerHTML = `<div class="gallery-empty">Erro ao carregar: ${e.message}</div>`;
    }
  }

  _shakeInput(el) {
    el.style.borderColor = '#e25c5c';
    el.animate([
      { transform: 'translateX(-4px)' }, { transform: 'translateX(4px)' },
      { transform: 'translateX(-3px)' }, { transform: 'translateX(3px)' },
      { transform: 'translateX(0)' }
    ], { duration: 300 });
    setTimeout(() => el.style.borderColor = '', 1000);
  }

  _startApp(w, h, bgImage, artworkData = null) {
    const home = document.getElementById('home-screen');
    if (home) home.classList.add('hidden');
    
    // Animate entry screen out
    const entry = document.getElementById('new-canvas-modal');
    if (!entry.classList.contains('hidden')) {
      entry.style.transition = 'opacity .3s, transform .3s';
      entry.style.opacity = '0';
      entry.style.transform = 'scale(1.02)';
    }

    setTimeout(() => {
      entry.classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');

      // Initialize engine
      this.eng = new CanvasEngine(w, h);
      this.be = new BrushEngine(this.eng);
      this.tm = new ToolManager(this.eng, this.be);
      window._app = this;
      window._ui = this;

      this.currentArtworkId = artworkData ? artworkData.id : 'art_' + Date.now();

      this._initAll();

      // Load or Create First layer
      if (artworkData && artworkData.layers) {
        this.eng.layers = [];
        
        Promise.all(artworkData.layers.map(lData => {
          return new Promise(resolve => {
            const l = this.eng.addLayer(lData.name);
            l.opacity = lData.opacity;
            l.blendMode = lData.blendMode;
            l.visible = lData.visible;
            l.locked = lData.locked;
            const img = new Image();
            img.onload = () => {
              l.canvas.getContext('2d').drawImage(img, 0, 0);
              resolve();
            };
            img.src = lData.dataURL;
          });
        })).then(() => {
          this.eng.activeLayerIdx = artworkData.activeLayerIdx || 0;
          this.eng.undo.push(this.eng.snapshot());
          this.eng.markDirty();
          this.refreshLayersPanel();
          this.be.previewBrush();
          this._syncQuickColors();
          this._updateCanvasInfo();
          this._patchBlurTool();
          this.toast('Arte carregada! 🎨');
        });
      } else {
        this.eng.addLayer('Background');
        const ctx = this.eng.activeLayer.canvas.getContext('2d');
        if (bgImage) {
          ctx.drawImage(bgImage, 0, 0, w, h);
        } else {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, w, h);
        }
        this.eng.undo.push(this.eng.snapshot());
        this.refreshLayersPanel();
        this.be.previewBrush();
        this._syncQuickColors();
        this._updateCanvasInfo();
        this._patchBlurTool();
        this.toast('Bem-vindo ao ArtCraft! 🎨');
      }
    }, 300);
  }

  _initAll() {
    this._initPalette();
    this._initColorWheel();
    this._syncSliders();
    this._initColorControls();
    this._initLayersPanel();
    this._initBrushLib();
    this._initTopBar();
    this._initBrushSettings();
    this._initModals();
    this._initPanelTabs();
    this._initToolButtons();
    this._initKeyboard();
  }

  // ═══════════════════════════════════════════════════════════ TOAST
  toast(msg) {
    const t = this._toastEl;
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ═══════════════════════════════════════════════════════════ TOP BAR
  _initTopBar() {
    document.getElementById('btn-back').onclick = async () => {
      if (confirm('Deseja salvar a arte na Galeria Local antes de voltar para a tela inicial? (Cancelar apenas voltará sem salvar)')) {
        await this._saveArtworkToLocal();
      }
      document.getElementById('app').classList.add('hidden');
      document.getElementById('new-canvas-modal').classList.add('hidden');
      document.getElementById('new-canvas-modal').style.opacity = '1';
      document.getElementById('new-canvas-modal').style.transform = '';
      const home = document.getElementById('home-screen');
      if (home) home.classList.remove('hidden');
    };
    document.getElementById('btn-undo').onclick = () => this.undo();
    document.getElementById('btn-redo').onclick = () => this.redo();
    document.getElementById('btn-save').onclick = () => this._savePng();
    document.getElementById('btn-zoom-fit').onclick = () => this.eng._fitToView();
    document.getElementById('btn-menu').onclick = (e) => {
      e.stopPropagation();
      this._toggleMenu();
    };
    // Menu items
    document.getElementById('menu-new').onclick = () => {
      this._closeMenu();
      if (confirm('Criar nova arte? As alterações não salvas serão perdidas.')) {
        document.getElementById('app').classList.add('hidden');
        const entry = document.getElementById('entry-screen');
        entry.classList.remove('hidden');
        entry.style.opacity = '1';
        entry.style.transform = '';
      }
    };
    document.getElementById('menu-open').onclick = () => {
      this._closeMenu();
      document.getElementById('open-image-input').click();
    };
    document.getElementById('menu-save-png').onclick = () => { this._closeMenu(); this._savePng(); };
    document.getElementById('menu-save-jpg').onclick = () => { this._closeMenu(); this._saveJpg(); };
    const btnMenuSaveLocal = document.getElementById('menu-save-local');
    if (btnMenuSaveLocal) btnMenuSaveLocal.onclick = () => { this._closeMenu(); this._saveArtworkToLocal(); };

    document.addEventListener('click', () => this._closeMenu());
    document.getElementById('app-menu').addEventListener('click', e => e.stopPropagation());
  }

  async _saveArtworkToLocal() {
    this.toast('Salvando na Galeria Local...');
    const thumbCanvas = this._buildFlatCanvas(true);
    const thumbURL = thumbCanvas.toDataURL('image/jpeg', 0.5);

    const layersData = this.eng.layers.map(l => {
      return {
        name: l.name,
        opacity: l.opacity,
        blendMode: l.blendMode,
        visible: l.visible,
        locked: l.locked,
        dataURL: l.canvas.toDataURL('image/png')
      };
    });

    const artwork = {
      id: this.currentArtworkId || 'art_' + Date.now(),
      name: 'Arte ' + new Date().toLocaleDateString(),
      width: this.eng.width,
      height: this.eng.height,
      activeLayerIdx: this.eng.activeLayerIdx,
      thumbURL,
      layers: layersData
    };

    try {
      if (window.artStorage) {
        await window.artStorage.saveArtwork(artwork);
        this.currentArtworkId = artwork.id;
        this.toast('Arte salva na Galeria Local!');
      }
    } catch (e) {
      console.error(e);
      this.toast('Erro ao salvar no IndexedDB');
    }
  }

  _toggleMenu() {
    const menu = document.getElementById('app-menu');
    this._menuOpen = !this._menuOpen;
    menu.classList.toggle('hidden', !this._menuOpen);
  }
  _closeMenu() {
    this._menuOpen = false;
    document.getElementById('app-menu').classList.add('hidden');
  }

  _updateCanvasInfo() {
    document.getElementById('canvas-info').textContent = `${this.eng.width} × ${this.eng.height}`;
  }

  undo() { const s = this.eng.undo.undo(); if (s) { this.eng.restoreSnapshot(s); this.refreshLayersPanel(); this.toast('Desfeito'); } }
  redo() { const s = this.eng.undo.redo(); if (s) { this.eng.restoreSnapshot(s); this.refreshLayersPanel(); this.toast('Refeito'); } }

  _buildFlatCanvas(withWhiteBg) {
    const tmp = document.createElement('canvas');
    tmp.width = this.eng.width; tmp.height = this.eng.height;
    const ctx = tmp.getContext('2d');
    if (withWhiteBg) { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, tmp.width, tmp.height); }
    for (let i = this.eng.layers.length - 1; i >= 0; i--) {
      const l = this.eng.layers[i];
      if (!l.visible) continue;
      ctx.globalAlpha = l.opacity / 100;
      ctx.globalCompositeOperation = l.blendMode;
      ctx.drawImage(l.canvas, 0, 0);
    }
    ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
    return tmp;
  }

  _downloadBlob(canvas, filename, mimeType, quality) {
    canvas.toBlob(blob => {
      if (!blob) { this.toast('Erro ao gerar arquivo'); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = filename;
      a.href = url;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }, mimeType, quality);
  }

  _savePng() {
    const tmp = this._buildFlatCanvas(false);
    this._downloadBlob(tmp, `artcraft_${Date.now()}.png`, 'image/png');
    this.toast('💾 PNG salvo!');
  }

  _saveJpg() {
    const tmp = this._buildFlatCanvas(true); // JPG needs white bg (no alpha)
    this._downloadBlob(tmp, `artcraft_${Date.now()}.jpg`, 'image/jpeg', 0.95);
    this.toast('💾 JPG salvo!');
  }

  // ═══════════════════════════════════════════════════════════ TOOL BUTTONS
  _initToolButtons() {
    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', () => this.setTool(btn.dataset.tool));
    });
  }

  setTool(t) {
    const unimpl = {
      'magic-wand': 'Varinha Mágica', 'filter': 'Filtro', 'special': 'Especial',
      'frame': 'Moldura', 'canvas': 'Tela', 'transform': 'Transformar'
    };
    if (unimpl[t]) {
      this.toast(`${unimpl[t]} não disponível na versão web.`);
      return;
    }
    
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
    this.tm.setTool(t);
    
    if (t === 'eraser') {
      const idx = this.be.brushes.findIndex(b => b.eraser);
      if (idx >= 0) { this.be.activeBrushIdx = idx; this.refreshBrushLib(); }
    } else if (t === 'smudge') {
      const idx = this.be.brushes.findIndex(b => b.smear);
      if (idx >= 0) { this.be.activeBrushIdx = idx; this.refreshBrushLib(); }
    }
    
    const vp = document.getElementById('canvas-viewport');
    if (t === 'move') vp.style.cursor = 'grab';
    else if (t === 'eyedropper') vp.style.cursor = 'cell';
    else if (t === 'fill') vp.style.cursor = 'copy';
    else if (t === 'select') vp.style.cursor = 'default';
    else vp.style.cursor = 'crosshair';
  }

  // ═══════════════════════════════════════════════════════════ KEYBOARD
  _initKeyboard() {
    window.addEventListener('keydown', e => {
      if (!this.eng) return;
      if (e.ctrlKey && e.key === 'z') { e.preventDefault(); this.undo(); }
      if (e.ctrlKey && (e.key === 'y' || e.key === 'Y')) { e.preventDefault(); this.redo(); }
      if (e.ctrlKey && e.key === 's') { e.preventDefault(); this._savePng(); }
      const map = { b: 'brush', e: 'eraser', g: 'fill', i: 'eyedropper', m: 'select-rect', l: 'lasso', v: 'move', t: 'text', u: 'blur' };
      if (!e.ctrlKey && !e.altKey && map[e.key]) this.setTool(map[e.key]);
    });
  }

  // ═══════════════════════════════════════════════════════════ COLOR WHEEL
  _initColorWheel() {
    const c = document.getElementById('color-wheel');
    this._drawWheel(c);
    let dragging = false, dragPart = null;
    c.addEventListener('mousedown', e => {
      dragging = true;
      dragPart = this._getWheelPart(e, c);
      this._pickWheel(e, c, dragPart);
    });
    window.addEventListener('mousemove', e => { if (dragging) this._pickWheel(e, c, dragPart); });
    window.addEventListener('mouseup', () => { dragging = false; dragPart = null; });
    c.addEventListener('touchstart', e => {
      dragPart = this._getWheelPart(e.touches[0], c);
      this._pickWheel(e.touches[0], c, dragPart);
    }, { passive: true });
    c.addEventListener('touchmove', e => {
      this._pickWheel(e.touches[0], c, dragPart); e.preventDefault();
    }, { passive: false });
  }

  _drawWheel(c) {
    const ctx = c.getContext('2d'), cx = c.width / 2, cy = c.height / 2, R = cx - 2, r = R * 0.7;
    ctx.clearRect(0, 0, c.width, c.height);
    for (let a = 0; a < 360; a++) {
      const s = a * Math.PI / 180, en = (a + 1.5) * Math.PI / 180;
      const [rr, gg, bb] = hsvToRgb(a, 100, 100);
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, R, s, en); ctx.closePath();
      ctx.fillStyle = `rgb(${rr},${gg},${bb})`; ctx.fill();
    }
    // Ring mask (inner cutout)
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.fillStyle = '#0f0f12'; ctx.fill();
    this._drawSVTriangle(ctx, cx, cy, r, this.be.color.h);
    this._drawTriangleHandle(ctx, cx, cy, r);
  }

  _drawSVTriangle(ctx, cx, cy, r, hue) {
    const R2 = r * 0.96;
    const angle = hue * Math.PI / 180;
    const t0 = { x: cx + R2 * Math.cos(angle - Math.PI / 2), y: cy + R2 * Math.sin(angle - Math.PI / 2) };
    const t1 = { x: cx + R2 * Math.cos(angle - Math.PI / 2 + 2 * Math.PI / 3), y: cy + R2 * Math.sin(angle - Math.PI / 2 + 2 * Math.PI / 3) };
    const t2 = { x: cx + R2 * Math.cos(angle - Math.PI / 2 + 4 * Math.PI / 3), y: cy + R2 * Math.sin(angle - Math.PI / 2 + 4 * Math.PI / 3) };
    this._triVertices = [t0, t1, t2];
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.97, 0, Math.PI * 2); ctx.clip();
    const [hr, hg, hb] = hsvToRgb(hue, 100, 100);
    // White → Hue gradient
    const g1 = ctx.createLinearGradient(t0.x, t0.y, (t1.x + t2.x) / 2, (t1.y + t2.y) / 2);
    g1.addColorStop(0, 'white'); g1.addColorStop(1, `rgb(${hr},${hg},${hb})`);
    ctx.beginPath(); ctx.moveTo(t0.x, t0.y); ctx.lineTo(t1.x, t1.y); ctx.lineTo(t2.x, t2.y); ctx.closePath();
    ctx.fillStyle = g1; ctx.fill();
    // Transparent → Black overlay
    const g2 = ctx.createLinearGradient((t0.x + t1.x) / 2, (t0.y + t1.y) / 2, t2.x, t2.y);
    g2.addColorStop(0, 'transparent'); g2.addColorStop(1, 'black');
    ctx.beginPath(); ctx.moveTo(t0.x, t0.y); ctx.lineTo(t1.x, t1.y); ctx.lineTo(t2.x, t2.y); ctx.closePath();
    ctx.fillStyle = g2; ctx.fill();
    ctx.restore();
  }

  _drawTriangleHandle(ctx, cx, cy, r) {
    const { h, s, v } = this.be.color;
    const hp = this._svToTriPos(cx, cy, r, h, s / 100, v / 100);
    ctx.beginPath(); ctx.arc(hp.x, hp.y, 6, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(hp.x, hp.y, 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1; ctx.stroke();
    // Ring handle
    const R2 = (cx - 2) * 0.84, angle = h * Math.PI / 180;
    const rx = cx + R2 * Math.cos(angle - Math.PI / 2);
    const ry = cy + R2 * Math.sin(angle - Math.PI / 2);
    ctx.beginPath(); ctx.arc(rx, ry, 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.stroke();
  }

  _svToTriPos(cx, cy, r, hue, s, v) {
    const R2 = r * 0.96, angle = hue * Math.PI / 180;
    const t0 = { x: cx + R2 * Math.cos(angle - Math.PI / 2), y: cy + R2 * Math.sin(angle - Math.PI / 2) };
    const t1 = { x: cx + R2 * Math.cos(angle - Math.PI / 2 + 2 * Math.PI / 3), y: cy + R2 * Math.sin(angle - Math.PI / 2 + 2 * Math.PI / 3) };
    const t2 = { x: cx + R2 * Math.cos(angle - Math.PI / 2 + 4 * Math.PI / 3), y: cy + R2 * Math.sin(angle - Math.PI / 2 + 4 * Math.PI / 3) };
    const x = t0.x * (1 - s) * v + t1.x * s * v + t2.x * (1 - v);
    const y = t0.y * (1 - s) * v + t1.y * s * v + t2.y * (1 - v);
    return { x, y };
  }

  _getWheelPart(e, c) {
    const rect = c.getBoundingClientRect(), cx = c.width / 2, cy = c.height / 2;
    const x = e.clientX - rect.left - cx, y = e.clientY - rect.top - cy;
    const d = Math.sqrt(x * x + y * y), r = cx - 2;
    return d > r * 0.7 ? 'ring' : 'triangle';
  }

  _pickWheel(e, c, part) {
    const rect = c.getBoundingClientRect(), cx = c.width / 2, cy = c.height / 2;
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const dx = mx - cx, dy = my - cy;
    if (part === 'ring') {
      let h = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      if (h < 0) h += 360; if (h >= 360) h -= 360;
      this.be.color.h = h;
    } else {
      const verts = this._triVertices; if (!verts) return;
      const [t0, t1, t2] = verts;
      const denom = (t1.y - t2.y) * (t0.x - t2.x) + (t2.x - t1.x) * (t0.y - t2.y);
      if (Math.abs(denom) < 1e-10) return;
      const l0 = ((t1.y - t2.y) * (mx - t2.x) + (t2.x - t1.x) * (my - t2.y)) / denom;
      const l1 = ((t2.y - t0.y) * (mx - t2.x) + (t0.x - t2.x) * (my - t2.y)) / denom;
      const l2 = 1 - l0 - l1;
      // t0=white(v high, s=0), t1=hue(s=1,v=1), t2=black(v=0)
      const s = clamp(l1, 0, 1) / (clamp(l0, 0, 1) + clamp(l1, 0, 1) || 1);
      const v = clamp(l0 + l1, 0, 1);
      this.be.color.s = s * 100;
      this.be.color.v = v * 100;
    }
    this._syncSliders();
    this._redrawWheel();
    this._updateColorPreview();
    this._syncQuickColors();
  }

  _redrawWheel() {
    const c = document.getElementById('color-wheel');
    this._drawWheel(c);
  }

  // ═══════════════════════════════════════════════════════════ COLOR SLIDERS
  _syncSliders() {
    const { h, s, v, a } = this.be.color;
    document.getElementById('sl-h').value = h; document.getElementById('val-h').textContent = Math.round(h);
    document.getElementById('sl-s').value = s; document.getElementById('val-s').textContent = Math.round(s);
    document.getElementById('sl-v').value = v; document.getElementById('val-v').textContent = Math.round(v);
    document.getElementById('sl-a').value = a; document.getElementById('val-a').textContent = Math.round(a);
    const [r, g, b] = hsvToRgb(h, s, v);
    document.getElementById('hex-input').value = rgbToHex(r, g, b).toUpperCase();
    this._updateColorPreview();
  }

  _initColorControls() {
    ['h', 's', 'v', 'a'].forEach(ch => {
      document.getElementById('sl-' + ch).addEventListener('input', e => {
        this.be.color[ch] = parseFloat(e.target.value);
        document.getElementById('val-' + ch).textContent = Math.round(this.be.color[ch]);
        this._redrawWheel(); this._updateColorPreview(); this._syncQuickColors();
      });
    });
    document.getElementById('hex-input').addEventListener('change', e => {
      const hex = e.target.value.replace('#', '');
      if (hex.length === 6) {
        const [r, g, b] = hexToRgb(hex);
        const [h, s, v] = rgbToHsv(r, g, b);
        this.be.color = { h, s, v, a: this.be.color.a };
        this._syncSliders(); this._redrawWheel(); this._syncQuickColors();
      }
    });
    document.getElementById('qc-fg').addEventListener('click', () => { });
    document.getElementById('qc-bg').addEventListener('click', () => {
      // swap BG to current
    });
    document.getElementById('btn-swap-colors').addEventListener('click', () => {
      const tmp = { ...this.be.color };
      this.be.color = { ...this._bgColor };
      this._bgColor = { ...tmp };
      this._syncSliders(); this._redrawWheel(); this._syncQuickColors();
    });
  }

  _updateColorPreview() {
    const { r, g, b, a } = this.be.getRgba();
    document.getElementById('color-preview').style.background = `rgba(${r},${g},${b},${a})`;
  }

  _syncQuickColors() {
    const { r, g, b, a } = this.be.getRgba();
    document.getElementById('qc-fg').style.background = `rgba(${r},${g},${b},${a})`;
    const [br, bg, bb] = hsvToRgb(this._bgColor.h, this._bgColor.s, this._bgColor.v);
    document.getElementById('qc-bg').style.background = `rgb(${br},${bg},${bb})`;
    this._applyColorToTextLayer();
  }

  _applyColorToTextLayer() {
    if (this.eng && this.eng.activeLayer && this.eng.activeLayer.isText) {
      if(this.eng.activeLayer.textData.color !== this.be.getColorStr()){
         this.eng.updateActiveTextLayer({ color: this.be.getColorStr() });
      }
    }
  }

  syncColorFromEngine() {
    this._syncSliders(); this._redrawWheel(); this._addRecentColor();
  }

  _addRecentColor() {
    const { h, s, v, a } = this.be.color;
    const key = `${Math.round(h)},${Math.round(s)},${Math.round(v)}`;
    if (!this._recentColors.some(c => c.key === key)) {
      this._recentColors.unshift({ h, s, v, a, key });
      if (this._recentColors.length > 15) this._recentColors.pop();
      this._renderRecentSwatches();
    }
  }

  _renderRecentSwatches() {
    const el = document.getElementById('recent-swatches'); el.innerHTML = '';
    this._recentColors.forEach(c => {
      const [r, g, b] = hsvToRgb(c.h, c.s, c.v);
      const sw = document.createElement('div'); sw.className = 'swatch';
      sw.style.background = `rgba(${r},${g},${b},${c.a / 100})`;
      sw.title = `#${rgbToHex(r, g, b)}`;
      sw.onclick = () => { this.be.color = { ...c }; this._syncSliders(); this._redrawWheel(); this._syncQuickColors(); };
      el.appendChild(sw);
    });
  }

  _initPalette() {
    const colors = [
      '#000000', '#1a1a1a', '#333333', '#666666', '#999999', '#cccccc', '#ffffff',
      '#e84393', '#f06292', '#c2185b', '#880e4f', '#ff1744', '#ff5252', '#ff6e40',
      '#ff9800', '#ffb300', '#ffd740', '#ffff00', '#cddc39', '#69f0ae',
      '#00e676', '#00bcd4', '#0091ea', '#2979ff', '#651fff', '#d500f9',
      '#795548', '#607d8b', '#37474f', '#bf360c',
    ];
    const el = document.getElementById('palette-swatches');
    colors.forEach(hex => {
      const sw = document.createElement('div'); sw.className = 'swatch';
      sw.style.background = hex; sw.title = hex;
      sw.onclick = () => {
        const [r, g, b] = hexToRgb(hex.replace('#', ''));
        const [h, s, v] = rgbToHsv(r, g, b);
        this.be.color = { h, s, v, a: this.be.color.a };
        this._syncSliders(); this._redrawWheel(); this._syncQuickColors();
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
        sw.classList.add('selected');
      };
      el.appendChild(sw);
    });
  }

  // ═══════════════════════════════════════════════════════════ LAYERS PANEL
  _initLayersPanel() {
    document.getElementById('btn-add-layer').onclick = () => {
      this.eng.undo.push(this.eng.snapshot());
      this.eng.addLayer(); this.refreshLayersPanel(); this.toast('Camada adicionada');
    };
    document.getElementById('btn-dupe-layer').onclick = () => {
      this.eng.undo.push(this.eng.snapshot());
      this.eng.duplicateLayer(this.eng.activeLayerIdx); this.refreshLayersPanel();
      this.toast('Camada duplicada');
    };
    document.getElementById('btn-del-layer').onclick = () => {
      if (this.eng.layers.length <= 1) { this.toast('Mínimo 1 camada'); return; }
      this.eng.undo.push(this.eng.snapshot());
      this.eng.deleteLayer(this.eng.activeLayerIdx); this.refreshLayersPanel();
      this.toast('Camada excluída');
    };
    document.getElementById('btn-merge-down').onclick = () => {
      this.eng.undo.push(this.eng.snapshot());
      this.eng.mergeDown(this.eng.activeLayerIdx); this.refreshLayersPanel(); this.toast('Camadas mescladas');
    };
    document.getElementById('btn-flatten').onclick = () => {
      if (!confirm('Mesclar todas as camadas?')) return;
      this.eng.undo.push(this.eng.snapshot());
      while (this.eng.layers.length > 1) this.eng.mergeDown(0);
      this.refreshLayersPanel(); this.toast('Todas camadas mescladas');
    };
    
    document.getElementById('btn-import-layer').onclick = () => document.getElementById('import-layer-input').click();
    document.getElementById('import-layer-input').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        this.eng.undo.push(this.eng.snapshot());
        const layer = this.eng.addLayer(file.name.substring(0, 10));
        const ctx = layer.canvas.getContext('2d');
        const wr = this.eng.width / img.width;
        const hr = this.eng.height / img.height;
        const ratio = Math.min(wr, hr, 1);
        const w = img.width * ratio;
        const h = img.height * ratio;
        const x = (this.eng.width - w) / 2;
        const y = (this.eng.height - h) / 2;
        ctx.drawImage(img, x, y, w, h);
        layer._thumbDirty = true;
        this.eng.markDirty();
        this.refreshLayersPanel();
        this.toast('Imagem importada para nova camada!');
        e.target.value = '';
        URL.revokeObjectURL(url);
      };
      img.src = url;
    };

    const blendModes = ['source-over', 'multiply', 'screen', 'overlay', 'darken', 'lighten', 'color-dodge', 'color-burn', 'hard-light', 'soft-light', 'difference', 'exclusion'];
    const blendLabels = ['Normal', 'Multiply', 'Screen', 'Overlay', 'Darken', 'Lighten', 'Color Dodge', 'Color Burn', 'Hard Light', 'Soft Light', 'Difference', 'Exclusion'];
    const sel = document.getElementById('blend-mode-select');
    blendModes.forEach((m, i) => {
      const o = document.createElement('option'); o.value = m; o.textContent = blendLabels[i]; sel.appendChild(o);
    });
    sel.onchange = () => { if (this.eng.activeLayer) { this.eng.activeLayer.blendMode = sel.value; this.eng.markDirty(); } };

    const opa = document.getElementById('layer-opacity');
    opa.oninput = () => {
      if (!this.eng.activeLayer) return;
      const v = parseInt(opa.value);
      this.eng.activeLayer.opacity = v;
      document.getElementById('layer-opacity-val').textContent = v + '%';
      this.eng.markDirty();
    };
  }

  refreshLayersPanel() {
    const list = document.getElementById('layer-list'); list.innerHTML = '';
    this.eng.layers.forEach((l, i) => {
      const div = document.createElement('div');
      div.className = 'layer-item' + (i === this.eng.activeLayerIdx ? ' active' : '');
      const img = document.createElement('img'); img.className = 'layer-thumb';
      img.src = 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';
      l._thumbEl = img; l._thumbDirty = true;

      const name = document.createElement('span'); name.className = 'layer-name'; name.textContent = l.name;
      name.ondblclick = () => {
        const newName = prompt('Renomear camada:', l.name);
        if (newName) { l.name = newName; name.textContent = newName; }
      };
      const vis = document.createElement('span'); vis.className = 'layer-vis';
      vis.textContent = l.visible ? '👁' : '🚫';
      vis.onclick = e => {
        e.stopPropagation(); l.visible = !l.visible;
        vis.textContent = l.visible ? '👁' : '🚫'; this.eng.markDirty();
      };
      const lock = document.createElement('span');
      lock.className = 'layer-lock' + (l.locked ? ' locked' : ''); lock.textContent = '🔒';
      lock.onclick = e => { e.stopPropagation(); l.locked = !l.locked; lock.classList.toggle('locked', l.locked); };

      div.append(img, name, vis, lock);
      div.onclick = () => {
        this.eng.activeLayerIdx = i;
        document.querySelectorAll('.layer-item').forEach((el, j) => el.classList.toggle('active', j === i));
        document.getElementById('blend-mode-select').value = l.blendMode;
        document.getElementById('layer-opacity').value = l.opacity;
        document.getElementById('layer-opacity-val').textContent = l.opacity + '%';
      };
      div.draggable = true;
      div.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', i));
      div.addEventListener('dragover', e => { e.preventDefault(); div.style.background = 'rgba(232,67,147,0.1)'; });
      div.addEventListener('dragleave', () => div.style.background = '');
      div.addEventListener('drop', e => {
        e.preventDefault(); div.style.background = '';
        const from = parseInt(e.dataTransfer.getData('text/plain'));
        if (from === i) return;
        const moved = this.eng.layers.splice(from, 1)[0];
        const toIdx = from < i ? i - 1 : i;
        this.eng.layers.splice(toIdx, 0, moved);
        this.eng.activeLayerIdx = toIdx;
        this.eng.markDirty(); this.refreshLayersPanel();
      });
      list.appendChild(div);
    });
    setTimeout(() => { this.eng._dirty = true; }, 60);
    const al = this.eng.activeLayer;
    if (al) {
      document.getElementById('blend-mode-select').value = al.blendMode;
      document.getElementById('layer-opacity').value = al.opacity;
      document.getElementById('layer-opacity-val').textContent = al.opacity + '%';
    }
  }

  // ═══════════════════════════════════════════════════════════ BRUSH LIBRARY
  _initBrushLib() {
    this.refreshBrushLib();
    document.getElementById('btn-import-brush').onclick = () => document.getElementById('ibp-file-input').click();
    document.getElementById('ibp-file-input').onchange = async e => {
      const file = e.target.files[0]; if (!file) return;
      try {
        const b = await this.be.importIbp(file);
        this.refreshBrushLib(); this.toast(`🖌 Pincel "${b.name}" importado!`);
      } catch (err) { this.toast('Erro: ' + err.message); }
      e.target.value = '';
    };
  }

  refreshBrushLib() {
    const list = document.getElementById('brush-list'); list.innerHTML = '';
    this.be.brushes.forEach((b, i) => {
      const div = document.createElement('div');
      div.className = 'brush-item' + (i === this.be.activeBrushIdx ? ' active' : '');
      const pv = document.createElement('canvas');
      pv.className = 'brush-preview-icon'; pv.width = 52; pv.height = 32;
      const pc = pv.getContext('2d'); pc.fillStyle = '#16161f'; pc.fillRect(0, 0, 52, 32);
      const [pr, pg, pb] = hsvToRgb(this.be.color.h, this.be.color.s, this.be.color.v);
      pc.strokeStyle = `rgba(${pr},${pg},${pb},${(b.opacity / 100) * (b.flow / 100)})`;
      pc.lineWidth = clamp(b.size * 0.3, 1, 12);
      pc.lineCap = 'round'; pc.lineJoin = 'round';
      pc.beginPath(); pc.moveTo(4, 22); pc.quadraticCurveTo(26, 4, 48, 22); pc.stroke();
      const info = document.createElement('div'); info.className = 'brush-info';
      const nm = document.createElement('div'); nm.className = 'brush-name'; nm.textContent = b.name;
      const ds = document.createElement('div'); ds.className = 'brush-desc'; ds.textContent = b.desc || '';
      info.append(nm, ds); div.append(pv, info);
      div.onclick = () => {
        this.be.activeBrushIdx = i;
        this.refreshBrushLib(); this._syncBrushSettings(); this.be.previewBrush();
        document.getElementById('current-brush-name').textContent = b.name;
        if (b.eraser) this.setTool('eraser');
        else if (this.tm.activeTool === 'eraser') this.setTool('brush');
      };
      list.appendChild(div);
    });
  }

  // ═══════════════════════════════════════════════════════════ BRUSH SETTINGS
  _initBrushSettings() {
    const map = [
      ['bs-size', 'uiSize', 'bv-size'], ['bs-opacity', 'uiOpacity', 'bv-opacity'],
      ['bs-flow', 'uiFlow', 'bv-flow'], ['bs-hardness', 'uiHardness', 'bv-hardness'],
      ['bs-spacing', 'uiSpacing', 'bv-spacing'], ['bs-scatter', 'uiScatter', 'bv-scatter'],
    ];
    map.forEach(([sid, prop, vid]) => {
      document.getElementById(sid).addEventListener('input', e => {
        const v = parseFloat(e.target.value);
        this.be[prop] = v;
        document.getElementById(vid).textContent = v;
        this.be.previewBrush();
      });
    });
  }

  _syncBrushSettings() {
    const b = this.be.brush;
    document.getElementById('bs-size').value = b.size; document.getElementById('bv-size').textContent = b.size;
    document.getElementById('bs-opacity').value = b.opacity; document.getElementById('bv-opacity').textContent = b.opacity;
    document.getElementById('bs-flow').value = b.flow; document.getElementById('bv-flow').textContent = b.flow;
    document.getElementById('bs-hardness').value = b.hardness; document.getElementById('bv-hardness').textContent = b.hardness;
    document.getElementById('bs-spacing').value = b.spacing; document.getElementById('bv-spacing').textContent = b.spacing;
    document.getElementById('bs-scatter').value = b.scatter; document.getElementById('bv-scatter').textContent = b.scatter;
    this.be.uiSize = null; this.be.uiOpacity = null; this.be.uiFlow = null;
    this.be.uiHardness = null; this.be.uiSpacing = null; this.be.uiScatter = null;
  }

  // ═══════════════════════════════════════════════════════════ MODALS
  _initModals() {
    document.getElementById('modal-text-ok').onclick = () => {
      const text = document.getElementById('text-input').value;
      const font = document.getElementById('text-font').value;
      const size = parseInt(document.getElementById('text-size').value);
      this.tm.commitText(text, font, size); this._closeModals();
    };
    document.querySelectorAll('.modal-close,.btn-cancel').forEach(btn =>
      btn.addEventListener('click', () => this._closeModals()));
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) this._closeModals();
    });
  }

  _closeModals() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
  }

  // ═══════════════════════════════════════════════════════════ PANEL TABS
  _initPanelTabs() {
    document.querySelectorAll('.panel-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      });
    });
  }

  // ═══════════════════════════════════════════════════════════ BLUR PATCH
  _patchBlurTool() {
    const ui = this;
    const origBegin = BrushEngine.prototype.beginStroke;
    const origMove = BrushEngine.prototype.moveStroke;
    BrushEngine.prototype.beginStroke = function (x, y, p) {
      if (ui.tm.activeTool === 'blur') {
        this._painting = true; this._lastX = x; this._lastY = y;
        const ctx = this.eng.activeLayer.canvas.getContext('2d');
        this._blurStamp(ctx, x, y, this.size); this.eng.markDirty(); return;
      }
      origBegin.call(this, x, y, p);
    };
    BrushEngine.prototype.moveStroke = function (x, y, p) {
      if (ui.tm.activeTool === 'blur') {
        const ctx = this.eng.activeLayer.canvas.getContext('2d');
        this._blurStamp(ctx, x, y, this.size);
        this._lastX = x; this._lastY = y; this.eng.markDirty(); return;
      }
      origMove.call(this, x, y, p);
    };
  }
}

// ═══════════════════════════════════════════════════════════════ INIT
window.addEventListener('DOMContentLoaded', () => {
  new UIController();
});

</script>
